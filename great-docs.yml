# Great Docs Configuration
# See https://posit-dev.github.io/great-docs/user-guide/configuration.html

parser: numpy

site_url: "https://rich-iannone.github.io/greenwood/"

dynamic: true

# Logo & Favicon
# ---------------
# Point to a single logo file (replaces the text title in the navbar):
logo:
  light: assets/logo-light.png
  dark: assets/logo-dark.png

hero:
  name: false
  logo_height: 120px
  badges: false

# Lucide icons prepended to user-guide sidebar entries (keyed by page title).
nav_icons:
  sidebar:
    "Get started": compass
    "Installation": download
    "Quick start": rocket
    "Survival data and the Surv object": database
    "Data sources and formats": table
    "Estimating survival with Kaplan-Meier": trending-down
    "Comparing groups": git-compare
    "Visualizing survival": chart-spline
    "Cox regression": sigma
    "Cox model diagnostics": stethoscope
    "Parametric survival models": waves
    "Competing risks": split
    "Multi-state models": network
    "Prediction performance": target
    "Glossary": book-open-text

authors:
  - name: Richard Iannone
    role: Maintainer
    email: riannone@me.com
    github: rich-iannone
    orcid: 0000-0003-3925-190X

# API Reference Structure
reference:
  - title: The response
    desc: The Surv object, the spine of every analysis.
    contents:
      - name: Surv
        members: true
      - CensoringType

  - title: Non-parametric estimators
    desc: Kaplan-Meier survival and Nelson-Aalen cumulative hazard.
    contents:
      - name: KaplanMeier
        members: true
      - name: NelsonAalen
        members: true

  - title: Univariate parametric models
    desc: Standalone parametric distributions for data exploration and model selection.
    contents:
      - name: Parametric
        members: true
      - compare_distributions

  - title: Regression
    desc: Cox proportional hazards and parametric AFT models.
    contents:
      - name: CoxPH
        members: true
      - name: CoxNet
        members: true
      - name: ZPHResult
        members: true
      - name: AFT
        members: true
      - name: RoystonParmar
        members: true

  - title: Competing risks & multi-state
    desc: Cumulative incidence, the Fine-Gray model, and multi-state transition probabilities.
    contents:
      - name: AalenJohansen
        members: true
      - name: FineGray
        members: true
      - name: MultiState
        members: true

  - title: Group comparisons
    desc: The log-rank test, trend tests for ordered groups, the G-rho (Fleming-Harrington) family, and restricted mean survival time (RMST) comparisons.
    contents:
      - logrank_test
      - trend_test
      - pairwise_logrank_test
      - name: TestResult
        members: true
      - rmst_test
      - rmst_diff
      - pairwise_rmst_test
      - name: RMSTResult
        members: true
      - logrank_n_events
      - logrank_power
      - logrank_sample_size

  - title: Prediction performance
    desc: Concordance, IPCW Brier score, time-dependent AUC, calibration, and k-fold cross-validation.
    contents:
      - concordance_index
      - brier_score
      - integrated_brier_score
      - time_dependent_auc
      - integrated_auc
      - calibration
      - cross_validate

  - title: Visualization
    desc: Interactive survival curves, forest plots, and cumulative incidence visualizations with aligned numbers-at-risk tables.
    contents:
      - plot_survival
      - plot_forest
      - plot_cif
      - risk_table

  - title: Core kernel
    desc: The risk-set / event-table tabulation shared by KM, log-rank, and Cox.
    contents:
      - name: EventTable
        members: true
      - event_table
