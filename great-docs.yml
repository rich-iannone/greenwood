# Great Docs Configuration
# See https://posit-dev.github.io/great-docs/user-guide/configuration.html

parser: numpy

site_url: "https://rich-iannone.github.io/greenwood/"

dynamic: true

authors:
  - name: Richard Iannone
    role: Maintainer
    email: riannone@me.com
    github: rich-iannone
    orcid: 0000-0003-3925-190X

# API Reference Structure
# Sections for further estimators (CoxPH, ...), group tests, and visualization are
# added as they land.
reference:
  - title: The response
    desc: The Surv object, the spine of every analysis.
    contents:
      - name: Surv
        members: true
      - CensoringType

  - title: Non-parametric estimators
    desc: Kaplan-Meier survival and Nelson-Aalen cumulative hazard.
    contents:
      - name: KaplanMeier
        members: true
      - name: NelsonAalen
        members: true

  - title: Regression
    desc: Cox proportional hazards and parametric AFT models.
    contents:
      - name: CoxPH
        members: true
      - name: ZPHResult
        members: true
      - name: AFT
        members: true

  - title: Competing risks & multi-state
    desc: Cumulative incidence, the Fine-Gray model, and multi-state transition probabilities.
    contents:
      - name: AalenJohansen
        members: true
      - name: FineGray
        members: true
      - name: MultiState
        members: true

  - title: Group comparisons
    desc: The log-rank test and the G-rho (Fleming-Harrington) family.
    contents:
      - logrank_test
      - name: TestResult
        members: true

  - title: Visualization
    desc: plotnine survival curves and aligned numbers-at-risk tables.
    contents:
      - plot_survival
      - risk_table

  - title: Core kernel
    desc: The risk-set / event-table tabulation shared by KM, log-rank, and Cox.
    contents:
      - name: EventTable
        members: true
      - event_table
