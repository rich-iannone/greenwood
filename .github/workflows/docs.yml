name: CI Docs

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-docs:
    name: "Build Docs"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for accurate page timestamps
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package and docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[docs]"
          python -m pip install git+https://github.com/posit-dev/great-docs.git@main
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
      - name: Restore freeze cache
        uses: actions/cache@v4
        with:
          path: _freeze/
          key: freeze-${{ hashFiles('**/uv.lock', '**/poetry.lock', '**/requirements*.txt', '**/pyproject.toml') }}-${{ hashFiles('**/*.qmd') }}
          restore-keys: |
            freeze-${{ hashFiles('**/uv.lock', '**/poetry.lock', '**/requirements*.txt', '**/pyproject.toml') }}-
            freeze-
      - name: Build docs
        run: great-docs build
      - name: Save docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: great-docs/_site
          include-hidden-files: true
          
  publish-docs:
    name: "Publish Docs"
    runs-on: ubuntu-latest
    needs: "build-docs"
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: docs-html
          path: great-docs/_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: great-docs/_site
          include-hidden-files: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
