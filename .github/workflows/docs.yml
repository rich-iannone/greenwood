name: CI Docs

# The repo is currently private (rich-iannone/greenwood), so GitHub Pages
# publishing is deferred. For now this workflow only *builds* the site as a CI
# check. When the project moves to public, add the publish-docs / preview-docs
#jobs.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-docs:
    name: "Build Docs"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for accurate page timestamps
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package and docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[docs]"
          python -m pip install git+https://github.com/posit-dev/great-docs.git@main
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
      - name: Build docs
        run: great-docs build
      - name: Save docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: great-docs/_site
          include-hidden-files: true
